<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News｜トモスマ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== TAG カラー拡張 ===== */
    .tag-green  { display:inline-block; font-size:12px; font-weight:700; padding:4px 14px; border-radius:99px; background:#E8F5E9; color:#2E7D32; border:1px solid #A5D6A7; }
    .tag-blue   { display:inline-block; font-size:12px; font-weight:700; padding:4px 14px; border-radius:99px; background:#E3F2FD; color:#1565C0; border:1px solid #90CAF9; }
    .tag-yellow { display:inline-block; font-size:12px; font-weight:700; padding:4px 14px; border-radius:99px; background:#FFFDE7; color:#F57F17; border:1px solid #FFF176; }
    .tag-accent { display:inline-block; font-size:12px; font-weight:700; padding:4px 14px; border-radius:99px; background:var(--color-accent); color:#fff; border:1px solid var(--color-accent); }

    /* ===== フィルタータブ ===== */
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:48px; }
    .filter-btn {
      padding:8px 22px; border-radius:99px; border:1px solid var(--color-border);
      background:var(--color-surface); color:var(--color-muted);
      font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; font-family:var(--font-body);
    }
    .filter-btn:hover, .filter-btn.active { background:var(--color-accent); color:#fff; border-color:var(--color-accent); }

    /* ===== ブログ一覧グリッド ===== */
    .blog-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:28px; }

    .blog-card {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-md); overflow:hidden; display:flex; flex-direction:column;
      cursor:pointer; transition:transform .25s, box-shadow .25s;
    }
    .blog-card:hover { transform:translateY(-6px); box-shadow:0 16px 48px rgba(0,0,0,.08); }

    /* サムネイル */
    .blog-eyecatch {
      width:100%; height:200px; background:var(--color-border);
      display:flex; align-items:center; justify-content:center;
      color:var(--color-muted); font-size:13px; overflow:hidden;
    }
    .blog-eyecatch img { width:100%; height:100%; object-fit:cover; }

    /* カード本文 */
    .blog-card-body { padding:24px; flex:1; display:flex; flex-direction:column; gap:12px; }
    .blog-card-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .blog-date  { font-size:12px; color:var(--color-muted); font-weight:700; }
    .blog-title { font-family:var(--font-heading); font-size:18px; line-height:1.45; }
    .blog-excerpt { font-size:14px; color:var(--color-muted); line-height:1.8; flex:1; }
    .blog-card-footer { display:flex; align-items:center; justify-content:space-between; padding:0 24px 24px; font-size:13px; color:var(--color-muted); }
    .blog-author { display:flex; align-items:center; gap:6px; }
    .blog-author-icon { width:24px; height:24px; border-radius:50%; background:var(--color-border); display:flex; align-items:center; justify-content:center; font-size:12px; }
    .blog-readtime { color:var(--color-muted); }
    .read-more { color:var(--color-accent); font-weight:700; font-size:13px; }

    /* ===== 記事詳細 ===== */
    #article-view { display:none; }

    .article-header { padding:64px 0 48px; border-bottom:1px solid var(--color-border); }
    .article-back {
      display:inline-flex; align-items:center; gap:6px;
      font-size:14px; font-weight:700; color:var(--color-muted);
      margin-bottom:32px; cursor:pointer; transition:color .2s;
    }
    .article-back:hover { color:var(--color-accent); }
    .article-meta { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .article-title { font-family:var(--font-heading); font-size:clamp(24px, 4vw, 40px); line-height:1.3; margin-bottom:24px; }
    .article-info { display:flex; align-items:center; gap:16px; font-size:13px; color:var(--color-muted); }
    .article-author { display:flex; align-items:center; gap:6px; font-weight:700; }
    .article-author-icon { width:32px; height:32px; border-radius:50%; background:var(--color-border); display:flex; align-items:center; justify-content:center; font-size:16px; }

    /* アイキャッチ */
    .article-eyecatch {
      width:100%; max-height:480px; border-radius:var(--radius-md);
      background:var(--color-border); display:flex; align-items:center; justify-content:center;
      color:var(--color-muted); font-size:14px; margin:40px 0; overflow:hidden;
      aspect-ratio:16/9;
    }
    .article-eyecatch img { width:100%; height:100%; object-fit:cover; border-radius:var(--radius-md); }

    /* 本文エリア */
    .article-body {
      max-width:720px;
      font-size:17px; line-height:2; color:var(--color-text);
      padding-bottom:80px;
    }
    .article-body p  { margin-bottom:1.6em; }
    .article-body h2 { font-family:var(--font-heading); font-size:24px; margin:2.4em 0 .8em; padding-left:16px; border-left:4px solid var(--color-accent); line-height:1.4; }
    .article-body h3 { font-family:var(--font-heading); font-size:19px; margin:2em 0 .6em; }
    .article-body strong { font-weight:700; }
    .article-body a { color:var(--color-accent); text-decoration:underline; }
    .article-body br { line-height:2; }

    /* 記事ナビ（前後） */
    .article-nav { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:48px 0; border-top:1px solid var(--color-border); margin-top:0; }
    .article-nav-item {
      padding:20px 24px; background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:var(--radius-md); cursor:pointer; transition:all .2s;
    }
    .article-nav-item:hover { border-color:var(--color-accent); }
    .article-nav-item.next { text-align:right; }
    .nav-label { font-size:11px; color:var(--color-muted); font-weight:700; letter-spacing:.1em; margin-bottom:6px; }
    .nav-title { font-family:var(--font-heading); font-size:15px; line-height:1.4; }

    /* 件数 */
    .news-count { font-size:13px; color:var(--color-muted); margin-bottom:24px; }

    @media (max-width:600px) {
      .blog-grid { grid-template-columns:1fr; }
      .article-nav { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="nav-logo">トモスマ<span>.</span></a>
      <ul class="nav-links">
        <li><a href="index.html#philosophy">3つの哲学</a></li>
        <li><a href="index.html#service">メイン事業</a></li>
        <li><a href="events.html">イベント</a></li>
        <li><a href="news.html" class="active">News</a></li>
        <li><a href="index.html#join">参加する</a></li>
      </ul>
      <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:99px;border:1.5px solid var(--color-border);font-size:13px;font-weight:700;color:var(--color-muted);transition:all .2s;white-space:nowrap;" onmouseover="this.style.borderColor='var(--color-accent)';this.style.color='var(--color-accent)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-muted)'" data-i18n="nav.back">← トップへ</a>
      <div class="lang-toggle" role="group" aria-label="言語切り替え">
        <button class="lang-btn" data-lang="ja">JP</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="en">EN</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="km">KH</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="vi">VI</button>
      </div>
    </nav>
  </header>

  <main>

    <!-- ===== 一覧ビュー ===== -->
    <div id="list-view">
      <section class="page-hero" style="padding:80px 0 64px; border-bottom:1px solid var(--color-border);">
        <div class="container">
          <p class="section-label" data-i18n="news.label">News &amp; Blog</p>
          <h1 class="section-title" data-i18n="news.title">活動レポート</h1>
          <p class="section-body" style="margin-bottom:0;" data-i18n="news.body">トモスマの活動報告・開発の裏側・代表コラムをお届けします。</p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all"    data-i18n="news.filter.all">すべて</button>
            <button class="filter-btn" data-filter="お知らせ"       data-i18n="news.filter.notice">お知らせ</button>
            <button class="filter-btn" data-filter="活動報告"       data-i18n="news.filter.activity">活動報告</button>
            <button class="filter-btn" data-filter="開発"           data-i18n="news.filter.dev">開発</button>
            <button class="filter-btn" data-filter="メディア"       data-i18n="news.filter.media">メディア</button>
          </div>
          <p class="news-count" id="blog-count"></p>
          <div class="blog-grid" id="blog-grid"></div>
        </div>
      </section>
    </div>

    <!-- ===== 記事詳細ビュー ===== -->
    <div id="article-view">
      <div class="container">
        <div class="article-header">
          <div class="article-back" id="back-btn" data-i18n="news.back_list">← 一覧に戻る</div>
          <div class="article-meta" id="article-meta"></div>
          <h1 class="article-title" id="article-title"></h1>
          <div class="article-info" id="article-info"></div>
        </div>
        <div class="article-eyecatch" id="article-eyecatch"></div>
        <div class="article-body" id="article-body"></div>
        <nav class="article-nav" id="article-nav"></nav>
      </div>
    </div>

  </main>

  <footer>
    <div class="footer-inner">
      <div>
        <p class="footer-brand">トモスマ<span>.</span></p>
        <p class="footer-tagline" data-i18n="footer.tagline">どこにいても、笑顔と「共にある」未来を創る。</p>
      </div>
      <ul class="footer-links">
        <li><a href="index.html#philosophy">3つの哲学</a></li>
        <li><a href="index.html#service">メイン事業</a></li>
        <li><a href="events.html">イベント</a></li>
        <li><a href="news.html">News</a></li>
        <li><a href="index.html#join">参加する</a></li>
      </ul>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 トモスマ（With Smile &amp; Beyond）</span>
      <span>代表：渡辺 瑛太</span>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script>
    const listView    = document.getElementById('list-view');
    const articleView = document.getElementById('article-view');

    // ── 一覧を描画 ──────────────────────────────
    function renderList(filter = 'all') {
      const grid  = document.getElementById('blog-grid');
      const count = document.getElementById('blog-count');
      const items = filter === 'all' ? BLOG_DATA : BLOG_DATA.filter(p => p.category === filter);
      count.textContent = `${items.length} 件`;

      grid.innerHTML = items.map(post => `
        <article class="blog-card" onclick="openArticle(${post.id})">
          <div class="blog-eyecatch">
            ${post.eyecatch
              ? `<img src="${post.eyecatch}" alt="${post.title}">`
              : '[ サムネイル画像 ]'}
          </div>
          <div class="blog-card-body">
            <div class="blog-card-meta">
              <span class="${categoryColor(post.category)}">${post.category}</span>
              <span class="blog-date">${formatDate(post.date)}</span>
            </div>
            <h2 class="blog-title">${post.title}</h2>
            <p class="blog-excerpt">${post.excerpt}</p>
          </div>
          <div class="blog-card-footer">
            <span class="blog-author">
              <span class="blog-author-icon">👤</span>${post.author}
            </span>
            <span class="blog-readtime">📖 ${post.readTime}</span>
          </div>
        </article>
      `).join('');
    }

    // ── 記事を開く ──────────────────────────────
    function openArticle(id) {
      const post  = BLOG_DATA.find(p => p.id === id);
      const index = BLOG_DATA.findIndex(p => p.id === id);
      if (!post) return;

      // メタ
      document.getElementById('article-meta').innerHTML =
        `<span class="${categoryColor(post.category)}">${post.category}</span>
         <span style="font-size:12px;color:var(--color-muted);">${formatDate(post.date)}</span>`;

      document.getElementById('article-title').textContent = post.title;

      document.getElementById('article-info').innerHTML =
        `<span class="article-author"><span class="article-author-icon">👤</span>${post.author}</span>
         <span>📖 ${post.readTime}</span>`;

      // アイキャッチ
      const ec = document.getElementById('article-eyecatch');
      ec.innerHTML = post.eyecatch
        ? `<img src="${post.eyecatch}" alt="${post.title}">`
        : '[ アイキャッチ画像 — eyecatch に URL を設定してください ]';

      // 本文
      document.getElementById('article-body').innerHTML = post.body;

      // 前後ナビ
      const prev = BLOG_DATA[index + 1] || null;
      const next = BLOG_DATA[index - 1] || null;
      document.getElementById('article-nav').innerHTML = `
        ${prev
          ? `<div class="article-nav-item prev" onclick="openArticle(${prev.id})">
               <p class="nav-label">← 前の記事</p>
               <p class="nav-title">${prev.title}</p>
             </div>`
          : '<div></div>'}
        ${next
          ? `<div class="article-nav-item next" onclick="openArticle(${next.id})">
               <p class="nav-label">次の記事 →</p>
               <p class="nav-title">${next.title}</p>
             </div>`
          : '<div></div>'}
      `;

      // 表示切り替え
      listView.style.display    = 'none';
      articleView.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 一覧に戻る ──────────────────────────────
    document.getElementById('back-btn').addEventListener('click', () => {
      articleView.style.display = 'none';
      listView.style.display    = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ── フィルター ──────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(btn.dataset.filter);
      });
    });

    // ── 初期描画 ──────────────────────────────
    renderList();
  </script>

</body>
</html>
